<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理ツール — 木曜会エピソードDB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#6366f1' } } }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ログイン画面 -->
<div id="login-screen" class="hidden fixed inset-0 bg-gray-900 bg-opacity-95 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-10 text-center shadow-2xl max-w-sm w-full mx-4">
    <div class="text-4xl mb-4">🕳️</div>
    <h1 class="text-xl font-bold text-gray-800 mb-2">管理ツール</h1>
    <p class="text-gray-500 text-sm mb-8">管理者のみアクセスできます</p>
    <button id="login-btn" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-primary text-gray-700 font-medium py-3 px-6 rounded-xl transition-all hover:shadow-md">
      <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google でログイン
    </button>
  </div>
</div>

<!-- 権限なし画面 -->
<div id="no-access-screen" class="hidden fixed inset-0 bg-gray-900 bg-opacity-95 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-10 text-center shadow-2xl max-w-sm w-full mx-4">
    <div class="text-4xl mb-4">🚫</div>
    <p class="text-gray-700 font-medium mb-4">このページへのアクセス権限がありません</p>
    <a href="index.html" class="text-sm text-primary hover:underline">エピソード一覧に戻る</a>
  </div>
</div>

<!-- ヘッダー -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="index.html" class="text-gray-400 hover:text-gray-600 text-sm">← エピソード一覧</a>
      <span class="text-gray-300">|</span>
      <h1 class="text-lg font-bold text-gray-800">管理ツール</h1>
    </div>
    <div id="user-info" class="hidden flex items-center gap-2">
      <img id="user-avatar" class="w-7 h-7 rounded-full" src="" alt="">
      <span id="user-email" class="text-xs text-gray-500"></span>
      <button id="logout-btn" class="text-xs text-gray-400 hover:text-gray-600">ログアウト</button>
    </div>
  </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-6 space-y-6">

  <!-- APIキー設定 -->
  <section class="bg-white rounded-xl border border-gray-200 p-5">
    <h2 class="font-bold text-gray-800 mb-3">Gemini APIキー設定</h2>
    <div class="flex gap-2">
      <input id="api-key-input" type="password" placeholder="AIza..."
        class="flex-1 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-primary font-mono">
      <button onclick="saveApiKey()"
        class="bg-primary text-white text-sm px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors">保存</button>
      <button onclick="clearApiKey()"
        class="bg-gray-100 text-gray-600 text-sm px-4 py-2 rounded-lg hover:bg-gray-200 transition-colors">削除</button>
    </div>
    <p id="api-key-status" class="mt-2 text-xs text-gray-400"></p>
    <p class="mt-1 text-xs text-gray-400">APIキーはこのブラウザのみに保存されます。GitHubには送信されません。</p>
  </section>

  <!-- 1件テスト分析 -->
  <section class="bg-white rounded-xl border border-indigo-200 p-5">
    <div class="flex items-center gap-2 mb-3">
      <h2 class="font-bold text-gray-800">1件テスト分析</h2>
      <span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full">動作確認用</span>
    </div>
    <textarea id="test-input" placeholder="Fincsからコピーした投稿テキストを1件貼り付ける"
      class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-primary resize-none mb-3"
      rows="5"></textarea>
    <button onclick="analyzeOne()"
      class="w-full bg-indigo-500 text-white text-sm font-medium py-2.5 rounded-lg hover:bg-indigo-600 transition-colors">
      1件だけ分析する
    </button>

    <div id="test-result" class="hidden mt-4">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium text-gray-700">分析結果（編集できます）</span>
        <div id="test-genre-badge"></div>
      </div>
      <div class="flex items-center gap-2 mb-3 p-3 bg-gray-50 rounded-lg">
        <span class="text-xs text-gray-500 shrink-0">ジャンルを変更:</span>
        <button onclick="switchGenre(1)" data-genre="1"
          class="genre-switch-btn text-xs px-3 py-1.5 rounded-lg border font-medium transition-all">
          ①AI活用事例
        </button>
        <button onclick="switchGenre(2)" data-genre="2"
          class="genre-switch-btn text-xs px-3 py-1.5 rounded-lg border font-medium transition-all">
          ②変化・成長
        </button>
        <span class="text-xs text-gray-400 ml-1">JSONのgenreフィールドも自動更新されます</span>
      </div>
      <textarea id="test-result-json"
        class="w-full border border-gray-200 rounded-lg p-3 text-xs font-mono text-gray-700 resize-none focus:outline-none focus:border-primary"
        rows="18"></textarea>
      <div class="flex gap-2 mt-2">
        <button onclick="saveOne()"
          class="flex-1 bg-green-500 text-white text-sm font-medium py-2.5 rounded-lg hover:bg-green-600 transition-colors">
          Firestore に保存
        </button>
        <button onclick="clearTest()"
          class="bg-gray-100 text-gray-600 text-sm px-4 py-2.5 rounded-lg hover:bg-gray-200 transition-colors">
          クリア
        </button>
      </div>
    </div>
  </section>

  <!-- キュー -->
  <section class="bg-white rounded-xl border border-gray-200 p-5">
    <div class="flex items-center justify-between mb-3">
      <h2 class="font-bold text-gray-800">投稿キュー</h2>
      <span id="queue-count" class="text-sm text-gray-500">0 件</span>
    </div>
    <div class="flex gap-2 mb-3">
      <textarea id="post-input" placeholder="Fincsからコピーした投稿テキストを貼り付ける"
        class="flex-1 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-primary resize-none"
        rows="4"></textarea>
    </div>
    <button onclick="addToQueue()"
      class="w-full bg-gray-800 text-white text-sm font-medium py-2.5 rounded-lg hover:bg-gray-700 transition-colors">
      キューに追加
    </button>

    <div id="queue-list" class="mt-4 space-y-2"></div>

    <div id="process-section" class="hidden mt-4 pt-4 border-t border-gray-100">
      <button onclick="processAll()"
        class="w-full bg-primary text-white font-medium py-3 rounded-xl hover:bg-indigo-700 transition-colors">
        まとめて処理（Geminiで構造化）
      </button>
    </div>
  </section>

  <!-- 処理結果 -->
  <section id="results-section" class="hidden bg-white rounded-xl border border-gray-200 p-5">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-bold text-gray-800">処理結果</h2>
      <button onclick="saveAll()"
        class="bg-green-500 text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-green-600 transition-colors">
        全件 Firestore に保存
      </button>
    </div>

    <!-- 日次提案 -->
    <div id="daily-suggestion-box" class="hidden bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4">
      <div class="text-sm font-medium text-amber-800 mb-2">✨ 今日の発信ネタ提案</div>
      <div id="daily-suggestion-content" class="text-sm text-amber-700 whitespace-pre-wrap"></div>
    </div>

    <div id="results-list" class="space-y-4"></div>
  </section>

</main>

<script type="module">
  import { db, auth, googleProvider } from './firebase-config.js';
  import {
    collection, addDoc, doc, setDoc
  } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-firestore.js";
  import {
    onAuthStateChanged, signInWithPopup, signOut
  } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-auth.js";

  // ▼ 管理者（自分）のGoogleアカウントのメールアドレス
  const ADMIN_EMAIL = 'kazuya.imasaka@gmail.com';

  let queue = JSON.parse(localStorage.getItem('moku_queue') || '[]');
  let processedResults = [];

  // --- 認証 ---
  onAuthStateChanged(auth, async (user) => {
    if (!user) { showLogin(); return; }

    // 管理者チェック
    if (ADMIN_EMAIL && user.email !== ADMIN_EMAIL) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('no-access-screen').classList.remove('hidden');
      document.getElementById('user-info').classList.add('hidden');
      return;
    }

    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('user-info').classList.remove('hidden');
    document.getElementById('user-avatar').src = user.photoURL || '';
    document.getElementById('user-email').textContent = user.email;
    initApiKeyStatus();
    renderQueue();
  });

  document.getElementById('login-btn').addEventListener('click', async () => {
    try { await signInWithPopup(auth, googleProvider); }
    catch (e) { alert('ログインに失敗しました: ' + e.message); }
  });
  document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

  function showLogin() {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('user-info').classList.add('hidden');
  }

  // --- APIキー ---
  function initApiKeyStatus() {
    const key = localStorage.getItem('gemini_api_key');
    document.getElementById('api-key-status').textContent = key
      ? `✅ APIキーが設定済みです（${key.slice(0, 8)}...）`
      : '未設定';
    if (key) document.getElementById('api-key-input').placeholder = '（設定済み）変更する場合は入力';
  }

  window.saveApiKey = function() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val) { alert('APIキーを入力してください'); return; }
    localStorage.setItem('gemini_api_key', val);
    document.getElementById('api-key-input').value = '';
    initApiKeyStatus();
  };

  window.clearApiKey = function() {
    if (!confirm('APIキーを削除しますか？')) return;
    localStorage.removeItem('gemini_api_key');
    initApiKeyStatus();
  };

  // --- キュー ---
  function saveQueue() {
    localStorage.setItem('moku_queue', JSON.stringify(queue));
  }

  function renderQueue() {
    const list = document.getElementById('queue-list');
    document.getElementById('queue-count').textContent = `${queue.length} 件`;
    list.innerHTML = '';

    queue.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'flex items-start gap-2 bg-gray-50 rounded-lg p-3';
      div.innerHTML = `
        <span class="text-xs text-gray-400 mt-0.5 w-5 shrink-0">${i + 1}</span>
        <p class="flex-1 text-xs text-gray-600 line-clamp-3 whitespace-pre-line">${escapeHtml(item)}</p>
        <button onclick="removeFromQueue(${i})" class="text-gray-300 hover:text-red-400 shrink-0 text-lg leading-none">&times;</button>
      `;
      list.appendChild(div);
    });

    document.getElementById('process-section').classList.toggle('hidden', queue.length === 0);
  }

  window.addToQueue = function() {
    const text = document.getElementById('post-input').value.trim();
    if (!text) { alert('投稿テキストを入力してください'); return; }
    queue.push(text);
    saveQueue();
    document.getElementById('post-input').value = '';
    renderQueue();
  };

  window.removeFromQueue = function(i) {
    queue.splice(i, 1);
    saveQueue();
    renderQueue();
  };

  // --- Gemini 一括処理 ---
  window.processAll = async function() {
    const apiKey = localStorage.getItem('gemini_api_key');
    if (!apiKey) { alert('Gemini APIキーを設定してください'); return; }
    if (queue.length === 0) { alert('キューが空です'); return; }

    const btn = document.querySelector('#process-section button');
    btn.disabled = true;
    btn.textContent = '処理中...';

    try {
      const prompt = buildExtractionPrompt(queue);
      const raw = await callGemini(apiKey, prompt);
      const parsed = parseGeminiResponse(raw);
      processedResults = parsed.episodes;

      renderResults(parsed.episodes, parsed.daily_suggestion);

      if (parsed.daily_suggestion) {
        await addDoc(collection(db, 'contents'), {
          created_at: new Date().toISOString().slice(0, 10),
          type: 'daily_suggestion',
          source_episode_id: null,
          content: parsed.daily_suggestion,
          tone: '',
          status: 'draft'
        });
      }

      document.getElementById('results-section').classList.remove('hidden');
      document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });

      // キューをクリア
      queue = [];
      saveQueue();
      renderQueue();
    } catch (e) {
      alert('処理に失敗しました: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'まとめて処理（Geminiで構造化）';
    }
  };

  function buildExtractionPrompt(posts) {
    return `以下の投稿テキストをそれぞれ解析し、JSON形式で返してください。

【ジャンル分類】
- ジャンル1（genre: 1）: AI活用事例のシェア（ツールの使い方・作ったもの・学んだ知識）
- ジャンル2（genre: 2）: AIで自分の状況はこう変わった！（ビフォーアフター・成長・変化）

【出力形式】
以下のJSONのみを返してください（コードブロック不要）:
{
  "episodes": [
    // ジャンル1の場合:
    {
      "genre": 1,
      "author": "投稿者名",
      "date": "YYYY-MM-DD（不明な場合は今日の日付）",
      "title": "タイトル（投稿の一行目、なければ内容から1行で生成）",
      "title_generated": false,
      "tools": ["使ったツール"],
      "post_type": "how_to|product|progress|knowledge",
      "summary": "1〜2文の事実ベース要約",
      "message": "発信フックに使える抽象的なメッセージ（1文）",
      "background": null,
      "steps": null,
      "result": null,
      "key_point": null,
      "impression": null,
      "unsolved": null,
      "resources": [],
      "tags": ["タグ"],
      "status": "draft"
    },
    // ジャンル2の場合:
    {
      "genre": 2,
      "author": "投稿者名",
      "date": "YYYY-MM-DD",
      "title": "タイトル",
      "title_generated": false,
      "message": "発信フックに使える抽象的なメッセージ（1文）",
      "tools": null,
      "before": null,
      "after": "変化後の状況",
      "trigger": null,
      "key_action": null,
      "impact": null,
      "impression": null,
      "period": null,
      "scale": "small|big",
      "resources": [],
      "tags": ["タグ"],
      "status": "draft"
    }
  ],
  "daily_suggestion": "今日の一押しエピソードの発信提案（どのエピソードをどんな角度でX・YouTubeに使うか、2〜4文）"
}

【抽出ルール】
- 投稿形式がバラバラでも意味ベースで抽出する
- タイトルがなければ内容から1行で生成し title_generated: true にする
- 内輪用語は平易な言葉に言い換えて summary に入れる
- scale: big はキャリア変化・昇給・社外影響・アプリ公開・受賞など。それ以外は small
- 今日の日付: ${new Date().toISOString().slice(0, 10)}

【投稿テキスト（${posts.length}件）】
${posts.map((p, i) => `--- 投稿${i + 1} ---\n${p}`).join('\n\n')}`;
  }

  async function callGemini(apiKey, prompt) {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      }
    );
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `API error: ${res.status}`);
    }
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }

  function parseGeminiResponse(raw) {
    // JSONブロックを抽出
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Geminiの返答からJSONを抽出できませんでした');
    try {
      return JSON.parse(match[0]);
    } catch {
      throw new Error('JSONのパースに失敗しました。Geminiの返答を確認してください。');
    }
  }

  function renderResults(episodes, dailySuggestion) {
    if (dailySuggestion) {
      document.getElementById('daily-suggestion-box').classList.remove('hidden');
      document.getElementById('daily-suggestion-content').textContent = dailySuggestion;
    }

    const list = document.getElementById('results-list');
    list.innerHTML = '';
    episodes.forEach((ep, i) => {
      const div = document.createElement('div');
      div.className = 'border border-gray-200 rounded-xl p-4';
      const isG1 = String(ep.genre) === '1';
      const genreLabel = isG1 ? 'AI活用事例①' : '変化・成長②';
      const genreColor = isG1 ? 'bg-sky-100 text-sky-700' : 'bg-amber-100 text-amber-700';
      const g1Active = isG1 ? 'bg-primary text-white border-primary' : 'border-gray-200 text-gray-600';
      const g2Active = !isG1 ? 'bg-primary text-white border-primary' : 'border-gray-200 text-gray-600';
      div.innerHTML = `
        <div class="flex items-center justify-between mb-3">
          <span id="genre-badge-${i}" class="text-xs font-medium px-2 py-0.5 rounded-full ${genreColor}">${genreLabel}</span>
          ${ep.title_generated ? '<span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">タイトル要確認</span>' : ''}
        </div>
        <div class="flex items-center gap-2 mb-3 p-2 bg-gray-50 rounded-lg">
          <span class="text-xs text-gray-500 shrink-0">ジャンル変更:</span>
          <button onclick="switchResultGenre(${i}, 1)"
            class="result-genre-btn-${i} text-xs px-3 py-1 rounded-lg border font-medium transition-all ${g1Active}">①AI活用事例</button>
          <button onclick="switchResultGenre(${i}, 2)"
            class="result-genre-btn-${i} text-xs px-3 py-1 rounded-lg border font-medium transition-all ${g2Active}">②変化・成長</button>
        </div>
        <textarea class="result-json w-full border border-gray-200 rounded-lg p-3 text-xs font-mono text-gray-700 resize-none focus:outline-none focus:border-primary"
          rows="12" data-index="${i}">${JSON.stringify(ep, null, 2)}</textarea>
      `;
      list.appendChild(div);
    });
  }

  // --- キュー処理結果のジャンル切り替え ---
  window.switchResultGenre = function(i, genre) {
    const ta = document.querySelector(`.result-json[data-index="${i}"]`);
    let ep;
    try { ep = JSON.parse(ta.value); } catch {
      alert('JSONの形式が崩れています。編集内容を確認してください。'); return;
    }
    ep.genre = genre;
    ta.value = JSON.stringify(ep, null, 2);

    // バッジ更新
    const badge = document.getElementById(`genre-badge-${i}`);
    if (genre === 1) {
      badge.className = 'text-xs font-medium px-2 py-0.5 rounded-full bg-sky-100 text-sky-700';
      badge.textContent = 'AI活用事例①';
    } else {
      badge.className = 'text-xs font-medium px-2 py-0.5 rounded-full bg-amber-100 text-amber-700';
      badge.textContent = '変化・成長②';
    }

    // ボタンのアクティブ状態
    document.querySelectorAll(`.result-genre-btn-${i}`).forEach(btn => {
      const active = btn.textContent.includes(genre === 1 ? '①' : '②');
      btn.classList.toggle('bg-primary', active);
      btn.classList.toggle('text-white', active);
      btn.classList.toggle('border-primary', active);
      btn.classList.toggle('border-gray-200', !active);
      btn.classList.toggle('text-gray-600', !active);
    });
  };

  // --- 1件テスト分析 ---
  window.analyzeOne = async function() {
    const apiKey = localStorage.getItem('gemini_api_key');
    if (!apiKey) { alert('Gemini APIキーを設定してください'); return; }
    const text = document.getElementById('test-input').value.trim();
    if (!text) { alert('投稿テキストを入力してください'); return; }

    const btn = document.querySelector('#test-result ~ * button, section button[onclick="analyzeOne()"]');
    const allBtns = document.querySelectorAll('button[onclick="analyzeOne()"]');
    allBtns.forEach(b => { b.disabled = true; b.textContent = '分析中...'; });

    try {
      const prompt = buildExtractionPrompt([text]);
      const raw = await callGemini(apiKey, prompt);
      const parsed = parseGeminiResponse(raw);
      const ep = parsed.episodes?.[0];
      if (!ep) throw new Error('エピソードを抽出できませんでした');

      document.getElementById('test-result-json').value = JSON.stringify(ep, null, 2);

      const isGenre1 = String(ep.genre) === '1';
      const badge = document.getElementById('test-genre-badge');
      badge.innerHTML = isGenre1
        ? '<span class="text-xs bg-sky-100 text-sky-700 px-2 py-0.5 rounded-full font-medium">AI活用事例①</span>'
        : '<span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-medium">変化・成長②</span>';
      if (ep.title_generated) {
        badge.innerHTML += ' <span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">タイトル要確認</span>';
      }

      document.getElementById('test-result').classList.remove('hidden');

      // ジャンル切り替えボタンの初期アクティブ状態を設定
      switchGenre(ep.genre === 1 ? 1 : 2);
    } catch (e) {
      alert('分析に失敗しました: ' + e.message);
    } finally {
      allBtns.forEach(b => { b.disabled = false; b.textContent = '1件だけ分析する'; });
    }
  };

  window.saveOne = async function() {
    const jsonText = document.getElementById('test-result-json').value;
    let ep;
    try { ep = JSON.parse(jsonText); }
    catch { alert('JSONの形式が正しくありません。編集内容を確認してください。'); return; }

    try {
      await addDoc(collection(db, 'episodes'), ep);
      alert('Firestore に保存しました');
      clearTest();
    } catch (e) {
      alert('保存に失敗しました: ' + e.message);
    }
  };

  window.switchGenre = function(genre) {
    const ta = document.getElementById('test-result-json');
    let ep;
    try { ep = JSON.parse(ta.value); } catch {
      alert('JSONの形式が崩れています。先に編集内容を確認してください。'); return;
    }
    ep.genre = genre;
    ta.value = JSON.stringify(ep, null, 2);

    // バッジ更新
    const badge = document.getElementById('test-genre-badge');
    badge.innerHTML = genre === 1
      ? '<span class="text-xs bg-sky-100 text-sky-700 px-2 py-0.5 rounded-full font-medium">AI活用事例①</span>'
      : '<span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-medium">変化・成長②</span>';
    if (ep.title_generated) {
      badge.innerHTML += ' <span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">タイトル要確認</span>';
    }

    // ボタンのアクティブ状態
    document.querySelectorAll('.genre-switch-btn').forEach(btn => {
      const active = Number(btn.dataset.genre) === genre;
      btn.classList.toggle('bg-primary', active);
      btn.classList.toggle('text-white', active);
      btn.classList.toggle('border-primary', active);
    });
  };

  window.clearTest = function() {
    document.getElementById('test-input').value = '';
    document.getElementById('test-result-json').value = '';
    document.getElementById('test-result').classList.add('hidden');
  };

  // --- 全件保存 ---
  window.saveAll = async function() {
    if (processedResults.length === 0) { alert('保存するデータがありません'); return; }

    const btn = document.querySelector('#results-section button');
    btn.disabled = true;
    btn.textContent = '保存中...';

    try {
      // textareaの編集内容を反映
      document.querySelectorAll('.result-json').forEach(ta => {
        const i = parseInt(ta.dataset.index);
        try { processedResults[i] = JSON.parse(ta.value); } catch {}
      });

      const promises = processedResults.map(ep =>
        addDoc(collection(db, 'episodes'), ep)
      );
      await Promise.all(promises);
      alert(`${processedResults.length} 件を Firestore に保存しました`);
      processedResults = [];
      document.getElementById('results-section').classList.add('hidden');
    } catch (e) {
      alert('保存に失敗しました: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '全件 Firestore に保存';
    }
  };

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
