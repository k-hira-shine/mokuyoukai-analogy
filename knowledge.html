    <h1 class="text-xl font-bold text-gray-800 mb-2">ナレッジ</h1>
    <p class="text-gray-500 text-sm mb-8">管理者のみアクセスできます</p>

      <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google でログイン

<!-- 権限なし画面 -->

<!-- コンテンツ生成モーダル -->
<div id="gen-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <h3 class="font-bold text-gray-800" id="gen-modal-title">コンテンツを生成</h3>
      <button onclick="closeGenModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
    </div>
    <div class="overflow-y-auto flex-1 p-6 space-y-5">
      <!-- 内容確認 -->
      <div>
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">要約・ポイント</p>
        <p id="gen-summary-text" class="text-sm text-gray-700 leading-relaxed whitespace-pre-line"></p>
      </div>
      <div id="gen-memo-row" class="hidden">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">自分のメモ・所感</p>
        <p id="gen-memo-text" class="text-sm text-gray-600 leading-relaxed whitespace-pre-line"></p>
      </div>
      <!-- 生成メニュー -->
      <div>
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">何を作りますか？（複数選択可）</p>
        <div class="space-y-2" id="gen-menu">
          <label class="flex items-start gap-3 p-3 rounded-xl border border-gray-200 hover:border-primary cursor-pointer transition-colors">
            <input type="checkbox" value="sns" class="mt-0.5 accent-indigo-500">
            <div><p class="text-sm font-medium text-gray-700">SNS投稿文</p><p class="text-xs text-gray-400">X / Threads 向けの短い発信（280文字前後）</p></div>
          </label>
          <label class="flex items-start gap-3 p-3 rounded-xl border border-gray-200 hover:border-primary cursor-pointer transition-colors">
            <input type="checkbox" value="episode" class="mt-0.5 accent-indigo-500">
            <div><p class="text-sm font-medium text-gray-700">エピソード下書き</p><p class="text-xs text-gray-400">木曜会の既存フォーマット（タイトル・要約・key_point など）に流し込む</p></div>
          </label>
          <label class="flex items-start gap-3 p-3 rounded-xl border border-gray-200 hover:border-primary cursor-pointer transition-colors">
            <input type="checkbox" value="qa" class="mt-0.5 accent-indigo-500">
            <div><p class="text-sm font-medium text-gray-700">Q&amp;A形式のまとめ</p><p class="text-xs text-gray-400">講義内容から想定問答を3〜5組生成</p></div>
          </label>
          <label class="flex items-start gap-3 p-3 rounded-xl border border-gray-200 hover:border-primary cursor-pointer transition-colors">
            <input type="checkbox" value="slide" class="mt-0.5 accent-indigo-500">
            <div><p class="text-sm font-medium text-gray-700">スライド用の箇条書き</p><p class="text-xs text-gray-400">発表・共有用のアウトライン</p></div>
          </label>
          <label class="flex items-start gap-3 p-3 rounded-xl border border-gray-200 hover:border-primary cursor-pointer transition-colors">
            <input type="checkbox" value="newsletter" class="mt-0.5 accent-indigo-500">
            <div><p class="text-sm font-medium text-gray-700">ニュースレター・メモ形式</p><p class="text-xs text-gray-400">長めの読み物としてまとめる</p></div>
          </label>
          <label class="flex items-start gap-3 p-3 rounded-xl border border-gray-200 hover:border-primary cursor-pointer transition-colors">
            <input type="checkbox" value="memo_post" class="mt-0.5 accent-indigo-500">
            <div><p class="text-sm font-medium text-gray-700">メモ・所感ベースの発信文</p><p class="text-xs text-gray-400">自分が書いたメモを主な素材にした投稿（自分の言葉・視点を活かす）</p></div>
          </label>
        </div>
      </div>
      <!-- 生成結果 -->
      <div id="gen-result-area" class="hidden">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">生成結果</p>
        <div id="gen-result-content" class="space-y-4"></div>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-gray-100 flex gap-2 justify-end">
      <button onclick="closeGenModal()" class="text-sm text-gray-500 hover:text-gray-700 px-4 py-2">キャンセル</button>
      <button id="gen-btn" onclick="generateContent()"
        class="bg-primary text-white text-sm px-5 py-2 rounded-lg hover:bg-indigo-700 transition-colors disabled:opacity-50">
        生成する
      </button>
    </div>
  </div>
</div>

<!-- ヘッダー -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="admin.html" class="text-gray-400 hover:text-gray-600 text-sm">← 管理ツール</a>
      <span class="text-gray-300">|</span>
      <h1 class="text-lg font-bold text-gray-800">ナレッジ</h1>
    </div>
    <div id="user-info" class="hidden flex items-center gap-2">
      <img id="user-avatar" class="w-7 h-7 rounded-full" src="" alt="">
      <span id="user-email" class="text-xs text-gray-500"></span>
      <button id="logout-btn" class="text-xs text-gray-400 hover:text-gray-600">ログアウト</button>
    </div>
  </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-6 space-y-6">

  <!-- APIキー設定 -->
  <section class="bg-white rounded-xl border border-gray-200 p-5">
    <h2 class="font-bold text-gray-800 mb-3">Gemini APIキー設定</h2>
    <div class="flex gap-2">
      <input id="api-key-input" type="password" placeholder="AIza..."
        class="flex-1 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-primary font-mono">
      <button onclick="saveApiKey()"
        class="bg-primary text-white text-sm px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors">保存</button>
      <button onclick="clearApiKey()"
        class="bg-gray-100 text-gray-600 text-sm px-4 py-2 rounded-lg hover:bg-gray-200 transition-colors">削除</button>
    </div>
    <p id="api-key-status" class="mt-2 text-xs text-gray-400"></p>
    <p class="mt-1 text-xs text-gray-400">APIキーはこのブラウザのみに保存されます。GitHubには送信されません。</p>
  </section>

  <!-- 新規講義を追加 -->
  <section class="bg-white rounded-xl border border-gray-200 p-5">
    <h2 class="font-bold text-gray-800 mb-4">新規講義を追加</h2>
    <div class="space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-gray-500 mb-1">講義タイトル</label>
          <input id="lecture-title" type="text" placeholder="例: Gemini API 活用入門"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary">
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">日付</label>
          <input id="lecture-date" type="date"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary">
        </div>
      </div>

      <div>
        <label class="block text-xs text-gray-500 mb-1">動画ファイル（mp4 / mov / webm）</label>
        <div id="drop-zone"
          class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center cursor-pointer hover:border-primary transition-colors"
          onclick="document.getElementById('video-file-input').click()"
          ondragover="event.preventDefault(); this.classList.add('border-primary')"
          ondragleave="this.classList.remove('border-primary')"
          ondrop="handleDrop(event)">
          <p class="text-gray-400 text-sm">クリックまたはドラッグ＆ドロップでファイルを選択</p>
          <p class="text-gray-300 text-xs mt-1">最大 1 GB</p>
        </div>
        <input id="video-file-input" type="file" accept="video/mp4,video/quicktime,video/webm" class="hidden"
          onchange="handleFileSelect(this.files[0])">
        <div id="file-info" class="hidden mt-2 flex items-center gap-2 text-sm text-gray-600">
          <span class="text-green-500">✓</span>
          <span id="file-name"></span>
          <span id="file-size" class="text-gray-400 text-xs"></span>
          <button onclick="clearFile()" class="text-gray-300 hover:text-red-400 ml-auto text-lg leading-none">&times;</button>
        </div>
      </div>

      <div id="progress-area" class="hidden space-y-1">
        <div class="flex items-center justify-between text-xs text-gray-500 mb-1">
          <span id="progress-label">アップロード中...</span>
          <span id="progress-pct"></span>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-1.5">
          <div id="progress-bar" class="bg-primary h-1.5 rounded-full transition-all" style="width:0%"></div>
        </div>
      </div>

      <button id="transcribe-btn" onclick="startTranscribe()"
        class="w-full bg-primary text-white text-sm py-2.5 rounded-lg hover:bg-indigo-700 transition-colors disabled:opacity-50">
        文字起こし・要約を生成
      </button>
    </div>
  </section>

  <!-- プレビュー・保存 -->
  <section id="preview-section" class="hidden bg-white rounded-xl border border-indigo-200 p-5 space-y-4">
    <div class="flex items-center gap-2">
      <h2 class="font-bold text-gray-800">生成結果</h2>
      <span id="file-deleted-badge" class="hidden text-xs bg-green-100 text-green-600 px-2 py-0.5 rounded-full">ファイル削除済み</span>
    </div>

    <div>
      <label class="block text-xs text-gray-500 mb-1">要約（編集可）</label>
      <textarea id="preview-summary" rows="4"
        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary resize-y"></textarea>
    </div>

    <div>
      <label class="block text-xs text-gray-500 mb-1">重要ポイント（1行1項目・編集可）</label>
      <textarea id="preview-keypoints" rows="4"
        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary resize-y font-mono"></textarea>
    </div>

    <details class="group">
      <summary class="cursor-pointer text-xs text-gray-400 hover:text-gray-600 select-none">
        文字起こし全文を表示 ▸
      </summary>
      <textarea id="preview-transcript" rows="10"
        class="mt-2 w-full border border-gray-100 rounded-lg px-3 py-2 text-xs text-gray-500 focus:outline-none focus:border-primary resize-y bg-gray-50"></textarea>
    </details>

    <div>
      <label class="block text-xs text-gray-500 mb-1">自分のメモ・所感（任意）</label>
      <textarea id="preview-memo" rows="3" placeholder="見た感想、気づいた点、使えそうなことなど..."
        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary resize-y"></textarea>
    </div>

    <div>
      <label class="block text-xs text-gray-500 mb-1">タグ（カンマ区切り）</label>
      <input id="preview-tags" type="text" placeholder="Gemini, プロンプト, 活用事例"
        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary">
    </div>

    <button onclick="saveLecture()"
      class="w-full bg-primary text-white text-sm py-2.5 rounded-lg hover:bg-indigo-700 transition-colors">
      Firestore に保存
    </button>
  </section>

  <!-- 保存済み講義一覧 -->
  <section class="bg-white rounded-xl border border-gray-200 p-5">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-bold text-gray-800">保存済み講義</h2>
      <span id="lectures-count" class="text-xs text-gray-400"></span>
    </div>
    <div id="lectures-list" class="space-y-3">
      <p class="text-sm text-gray-400 text-center py-4">読み込み中...</p>
    </div>
  </section>

</main>

<script type="module">
  import { db, auth, googleProvider } from './firebase-config.js';
  import {
    collection, addDoc, getDocs, doc, updateDoc, orderBy, query, serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-firestore.js';
  import {
    onAuthStateChanged, signInWithPopup, signOut
  } from 'https://www.gstatic.com/firebasejs/11.8.0/firebase-auth.js';

  const ADMIN_EMAIL = 'kazuya.imasaka@gmail.com';
  const GEMINI_FILE_API = 'https://generativelanguage.googleapis.com/upload/v1beta/files';
  const GEMINI_API_BASE = 'https://generativelanguage.googleapis.com/v1beta';

  let selectedFile = null;
  let currentLectureForGen = null;

  // --- 認証 ---
  /*
  onAuthStateChanged(auth, user => {
    if (!user) { showLogin(); return; }
    if (user.email !== ADMIN_EMAIL) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('no-access-screen').classList.remove('hidden');
      return;
    }
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('user-info').classList.remove('hidden');
    document.getElementById('user-avatar').src = user.photoURL || '';
    document.getElementById('user-email').textContent = user.email;
    initPage();
  });
  */

  // 認証一時停止中: 直接初期化
  initPage();

  function showLogin() {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('user-info').classList.add('hidden');
  }

  document.getElementById('login-btn').addEventListener('click', async () => {
    try { await signInWithPopup(auth, googleProvider); }
    catch (e) { alert('ログインに失敗しました: ' + e.message); }
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await signOut(auth);
    showLogin();
  });

  // --- 初期化 ---
  function initPage() {
    initApiKeyStatus();
    document.getElementById('lecture-date').value = new Date().toISOString().slice(0, 10);
    loadLectures();
  }

  // --- APIキー ---
  function initApiKeyStatus() {
    const key = localStorage.getItem('gemini_api_key');
    document.getElementById('api-key-status').textContent = key
      ? `✅ APIキーが設定済みです（${key.slice(0, 8)}...）`
      : '未設定';
    if (key) document.getElementById('api-key-input').placeholder = '（設定済み）変更する場合は入力';
  }

  window.saveApiKey = function() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val) { alert('APIキーを入力してください'); return; }
    localStorage.setItem('gemini_api_key', val);
    document.getElementById('api-key-input').value = '';
    initApiKeyStatus();
  };

  window.clearApiKey = function() {
    if (!confirm('APIキーを削除しますか？')) return;
    localStorage.removeItem('gemini_api_key');
    initApiKeyStatus();
  };

  // --- ファイル選択 ---
  window.handleDrop = function(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('border-primary');
    const file = e.dataTransfer.files[0];
    if (file) handleFileSelect(file);
  };

  window.handleFileSelect = function(file) {
    if (!file) return;
    selectedFile = file;
    const mb = (file.size / 1024 / 1024).toFixed(1);
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-size').textContent = `${mb} MB`;
    document.getElementById('file-info').classList.remove('hidden');
    document.getElementById('drop-zone').classList.add('hidden');
  };

  window.clearFile = function() {
    selectedFile = null;
    document.getElementById('video-file-input').value = '';
    document.getElementById('file-info').classList.add('hidden');
    document.getElementById('drop-zone').classList.remove('hidden');
  };

  // --- 文字起こし開始 ---
  window.startTranscribe = async function() {
    const apiKey = localStorage.getItem('gemini_api_key');
    if (!apiKey) { alert('Gemini APIキーを設定してください'); return; }
    if (!selectedFile) { alert('動画ファイルを選択してください'); return; }

    const btn = document.getElementById('transcribe-btn');
    btn.disabled = true;
    const progressArea = document.getElementById('progress-area');
    progressArea.classList.remove('hidden');

    try {
      // Step 1: File API にアップロード
      setProgress('動画をアップロード中...', 10);
      const fileUri = await uploadToGeminiFileApi(apiKey, selectedFile);

      // Step 2: ファイル処理待ち（ACTIVE になるまでポーリング）
      setProgress('AIがファイルを処理中...', 40);
      await waitForFileActive(apiKey, fileUri);

      // Step 3: 文字起こし＋要約リクエスト
      setProgress('文字起こし・要約を生成中...', 70);
      const result = await transcribeAndSummarize(apiKey, fileUri);

      // Step 4: ファイルを削除
      setProgress('ファイルを削除中...', 90);
      await deleteGeminiFile(apiKey, fileUri);

      setProgress('完了', 100);

      // プレビューに反映
      document.getElementById('preview-summary').value = result.summary;
      document.getElementById('preview-keypoints').value = (result.key_points || []).join('\n');
      document.getElementById('preview-transcript').value = result.transcript;
      document.getElementById('preview-memo').value = '';
      document.getElementById('preview-tags').value = '';
      document.getElementById('file-deleted-badge').classList.remove('hidden');
      document.getElementById('preview-section').classList.remove('hidden');
      document.getElementById('preview-section').scrollIntoView({ behavior: 'smooth' });

      clearFile();
    } catch (e) {
      alert('処理に失敗しました: ' + e.message);
    } finally {
      btn.disabled = false;
      progressArea.classList.add('hidden');
    }
  };

  function setProgress(label, pct) {
    document.getElementById('progress-label').textContent = label;
    document.getElementById('progress-pct').textContent = `${pct}%`;
    document.getElementById('progress-bar').style.width = `${pct}%`;
  }

  async function uploadToGeminiFileApi(apiKey, file) {
    // Gemini File API: まず resumable upload を開始して URI を取得
    const initRes = await fetch(`${GEMINI_FILE_API}?key=${apiKey}`, {
      method: 'POST',
      headers: {
        'X-Goog-Upload-Protocol': 'resumable',
        'X-Goog-Upload-Command': 'start',
        'X-Goog-Upload-Header-Content-Length': file.size,
        'X-Goog-Upload-Header-Content-Type': file.type,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ file: { display_name: file.name } }),
    });
    if (!initRes.ok) {
      const err = await initRes.json().catch(() => ({}));
      throw new Error(err.error?.message || `Upload init failed: ${initRes.status}`);
    }
    const uploadUrl = initRes.headers.get('X-Goog-Upload-URL');
    if (!uploadUrl) throw new Error('アップロードURLの取得に失敗しました');

    // ファイル本体を送信
    const uploadRes = await fetch(uploadUrl, {
      method: 'POST',
      headers: {
        'Content-Length': file.size,
        'X-Goog-Upload-Offset': '0',
        'X-Goog-Upload-Command': 'upload, finalize',
      },
      body: file,
    });
    if (!uploadRes.ok) {
      const err = await uploadRes.json().catch(() => ({}));
      throw new Error(err.error?.message || `Upload failed: ${uploadRes.status}`);
    }
    const data = await uploadRes.json();
    return data.file?.uri || data.file?.name;
  }

  async function waitForFileActive(apiKey, fileUri) {
    // fileUri は "https://..." の形式か "files/xxx" の形式
    const fileName = fileUri.includes('files/') ? fileUri.split('files/')[1].split('?')[0] : fileUri;
    for (let i = 0; i < 30; i++) {
      await new Promise(r => setTimeout(r, 3000));
      const res = await fetch(`${GEMINI_API_BASE}/files/${fileName}?key=${apiKey}`);
      if (!res.ok) continue;
      const data = await res.json();
      if (data.state === 'ACTIVE') return;
      if (data.state === 'FAILED') throw new Error('ファイルの処理に失敗しました（Gemini File API）');
    }
    throw new Error('ファイルの処理がタイムアウトしました');
  }

  async function transcribeAndSummarize(apiKey, fileUri) {
    const prompt = `この動画の音声を日本語で文字起こしし、以下のJSONのみを返してください（コードブロック不要）:
{
  "transcript": "話した内容の全文テキスト",
  "summary": "この講義の内容を2〜4文で要約したもの",
  "key_points": ["重要ポイント1", "重要ポイント2", "重要ポイント3"]
}
- 文字起こしは句読点・改行を適切に入れて読みやすくすること
- key_points は3〜7項目
- 日本語で出力`;

    const res = await fetch(
      `${GEMINI_API_BASE}/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: prompt },
              { file_data: { mime_type: selectedFile?.type || 'video/mp4', file_uri: fileUri } }
            ]
          }]
        }),
      }
    );
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Gemini API error: ${res.status}`);
    }
    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Geminiの返答からJSONを抽出できませんでした');
    return JSON.parse(match[0]);
  }

  async function deleteGeminiFile(apiKey, fileUri) {
    const fileName = fileUri.includes('files/') ? fileUri.split('files/')[1].split('?')[0] : fileUri;
    await fetch(`${GEMINI_API_BASE}/files/${fileName}?key=${apiKey}`, { method: 'DELETE' });
  }

  // --- Firestore 保存 ---
  window.saveLecture = async function() {
    const title = document.getElementById('lecture-title').value.trim();
    const date = document.getElementById('lecture-date').value;
    const summary = document.getElementById('preview-summary').value.trim();
    const transcript = document.getElementById('preview-transcript').value.trim();
    const memo = document.getElementById('preview-memo').value.trim();
    const tagsRaw = document.getElementById('preview-tags').value.trim();
    const keyPointsRaw = document.getElementById('preview-keypoints').value.trim();

    if (!title) { alert('タイトルを入力してください'); return; }
    if (!summary) { alert('要約が空です'); return; }

    const key_points = keyPointsRaw ? keyPointsRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];
    const tags = tagsRaw ? tagsRaw.split(/[,、]/).map(s => s.trim()).filter(Boolean) : [];

    try {
      await addDoc(collection(db, 'lectures'), {
        title, date, summary, transcript, memo, key_points, tags,
        status: 'done',
        createdAt: serverTimestamp(),
      });
      alert('保存しました');
      document.getElementById('preview-section').classList.add('hidden');
      document.getElementById('lecture-title').value = '';
      document.getElementById('lecture-date').value = new Date().toISOString().slice(0, 10);
      document.getElementById('file-deleted-badge').classList.add('hidden');
      loadLectures();
    } catch (e) {
      alert('保存に失敗しました: ' + e.message);
    }
  };

  // --- 講義一覧の読み込み ---
  async function loadLectures() {
    const list = document.getElementById('lectures-list');
    list.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">読み込み中...</p>';
    try {
      const q = query(collection(db, 'lectures'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      document.getElementById('lectures-count').textContent = `${snap.size} 件`;
      if (snap.empty) {
        list.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">保存済みの講義はありません</p>';
        return;
      }
      list.innerHTML = '';
      snap.forEach(docSnap => {
        const d = docSnap.data();
        const card = buildLectureCard(docSnap.id, d);
        list.appendChild(card);
      });
    } catch (e) {
      list.innerHTML = `<p class="text-sm text-red-400 text-center py-4">読み込みに失敗しました: ${e.message}</p>`;
    }
  }

  function buildLectureCard(id, d) {
    const div = document.createElement('div');
    div.className = 'border border-gray-200 rounded-xl p-4';
    div.dataset.id = id;

    const keyPointsHtml = d.key_points?.length
      ? `<ul class="mt-2 space-y-0.5">${d.key_points.slice(0, 3).map(p => `<li class="text-xs text-gray-500 flex gap-1"><span class="text-gray-300 shrink-0">•</span>${escapeHtml(p)}</li>`).join('')}${d.key_points.length > 3 ? `<li class="text-xs text-gray-400">他 ${d.key_points.length - 3} 項目...</li>` : ''}</ul>`
      : '';

    const tagsHtml = d.tags?.length
      ? `<div class="flex flex-wrap gap-1 mt-2">${d.tags.map(t => `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">${escapeHtml(t)}</span>`).join('')}</div>`
      : '';

    div.innerHTML = `
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <h3 class="font-medium text-gray-800 text-sm">${escapeHtml(d.title)}</h3>
            <span class="text-xs text-gray-400">${d.date || ''}</span>
          </div>
          <p class="text-xs text-gray-500 mt-1 line-clamp-2">${escapeHtml(d.summary || '')}</p>
          ${keyPointsHtml}
          ${tagsHtml}
        </div>
        <div class="flex gap-2 shrink-0">
          <button onclick="toggleDetail('${id}')"
            class="text-xs text-gray-400 hover:text-gray-600 border border-gray-200 rounded-lg px-3 py-1.5 transition-colors">
            詳細
          </button>
          <button onclick="openGenModal('${id}')"
            class="text-xs bg-primary text-white rounded-lg px-3 py-1.5 hover:bg-indigo-700 transition-colors">
            コンテンツを生成
          </button>
        </div>
      </div>
      <div id="detail-${id}" class="hidden mt-4 pt-4 border-t border-gray-100 space-y-3">
        <div>
          <p class="text-xs font-semibold text-gray-400 mb-1">要約</p>
          <p class="text-sm text-gray-600 whitespace-pre-line">${escapeHtml(d.summary || '')}</p>
        </div>
        ${d.memo ? `<div>
          <p class="text-xs font-semibold text-gray-400 mb-1">メモ・所感</p>
          <p class="text-sm text-gray-600 whitespace-pre-line">${escapeHtml(d.memo)}</p>
        </div>` : ''}
        ${d.key_points?.length ? `<div>
          <p class="text-xs font-semibold text-gray-400 mb-1">重要ポイント</p>
          <ul class="space-y-1">${d.key_points.map(p => `<li class="text-sm text-gray-600 flex gap-2"><span class="text-gray-300 shrink-0">•</span>${escapeHtml(p)}</li>`).join('')}</ul>
        </div>` : ''}
        <details>
          <summary class="cursor-pointer text-xs text-gray-400 hover:text-gray-600 select-none">文字起こし全文 ▸</summary>
          <p class="mt-2 text-xs text-gray-400 whitespace-pre-line leading-relaxed">${escapeHtml(d.transcript || '')}</p>
        </details>
        <div class="flex gap-2">
          <button onclick="startEdit('${id}')"
            class="text-xs text-gray-500 hover:text-gray-700 border border-gray-200 rounded-lg px-3 py-1.5 transition-colors">
            メモを編集
          </button>
        </div>
        <div id="edit-${id}" class="hidden space-y-2 pt-2 border-t border-gray-100">
          <textarea id="edit-memo-${id}" rows="3" placeholder="メモ・所感..."
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary resize-y">${escapeHtml(d.memo || '')}</textarea>
          <button onclick="saveMemo('${id}')"
            class="text-xs bg-primary text-white rounded-lg px-4 py-1.5 hover:bg-indigo-700 transition-colors">
            保存
          </button>
        </div>
      </div>
    `;
    return div;
  }

  window.toggleDetail = function(id) {
    const el = document.getElementById(`detail-${id}`);
    el.classList.toggle('hidden');
  };

  window.startEdit = function(id) {
    document.getElementById(`edit-${id}`).classList.toggle('hidden');
  };

  window.saveMemo = async function(id) {
    const memo = document.getElementById(`edit-memo-${id}`).value.trim();
    try {
      await updateDoc(doc(db, 'lectures', id), { memo });
      document.getElementById(`edit-${id}`).classList.add('hidden');
      loadLectures();
    } catch (e) {
      alert('保存に失敗しました: ' + e.message);
    }
  };

  // --- コンテンツ生成モーダル ---
  window.openGenModal = async function(id) {
    // Firestoreから最新データを取得
    const snap = await getDocs(query(collection(db, 'lectures')));
    snap.forEach(docSnap => {
      if (docSnap.id === id) currentLectureForGen = { id, ...docSnap.data() };
    });
    if (!currentLectureForGen) return;

    document.getElementById('gen-modal-title').textContent = currentLectureForGen.title || 'コンテンツを生成';
    document.getElementById('gen-summary-text').textContent =
      (currentLectureForGen.summary || '') +
      (currentLectureForGen.key_points?.length
        ? '\n\n重要ポイント:\n' + currentLectureForGen.key_points.map(p => `• ${p}`).join('\n')
        : '');

    const memoRow = document.getElementById('gen-memo-row');
    if (currentLectureForGen.memo) {
      document.getElementById('gen-memo-text').textContent = currentLectureForGen.memo;
      memoRow.classList.remove('hidden');
    } else {
      memoRow.classList.add('hidden');
    }

    // チェックボックスをリセット
    document.querySelectorAll('#gen-menu input[type=checkbox]').forEach(cb => cb.checked = false);
    document.getElementById('gen-result-area').classList.add('hidden');
    document.getElementById('gen-result-content').innerHTML = '';

    document.getElementById('gen-modal').classList.remove('hidden');
  };

  window.closeGenModal = function() {
    document.getElementById('gen-modal').classList.add('hidden');
    currentLectureForGen = null;
  };

  window.generateContent = async function() {
    const apiKey = localStorage.getItem('gemini_api_key');
    if (!apiKey) { alert('Gemini APIキーを設定してください'); return; }

    const selected = [...document.querySelectorAll('#gen-menu input[type=checkbox]:checked')].map(cb => cb.value);
    if (selected.length === 0) { alert('生成するコンテンツを1つ以上選択してください'); return; }

    const btn = document.getElementById('gen-btn');
    btn.disabled = true;
    btn.textContent = '生成中...';

    const d = currentLectureForGen;
    const context = `【講義タイトル】${d.title}\n【要約】${d.summary}\n【重要ポイント】\n${(d.key_points || []).map(p => `• ${p}`).join('\n')}`;
    const memoContext = d.memo ? `【自分のメモ・所感】\n${d.memo}` : '';

    const prompts = {
      sns: `${context}\n\nこの講義内容をもとに、X（旧Twitter）向けのSNS投稿文を1つ作成してください。280文字前後、読者が「自分も試したい」と思えるような発信文にしてください。`,
      episode: `${context}\n\nこの講義内容をもとに、以下のJSONフォーマットで木曜会エピソードの下書きを作成してください（JSONのみ返答）:\n{"title":"","post_type":"knowledge","summary":"","key_point":"","impression":"","tags":[]}`,
      qa: `${context}\n\nこの講義内容から、想定されるQ&Aを3〜5組作成してください。「Q: 〜\nA: 〜」の形式で出力してください。`,
      slide: `${context}\n\nこの講義内容をスライド発表用のアウトラインにしてください。章タイトルと箇条書きで構成し、発表時間10〜15分相当のボリュームで。`,
      newsletter: `${context}\n\nこの講義内容をニュースレター・読み物形式でまとめてください。導入・本文・まとめの構成で、500〜800文字程度。`,
      memo_post: `${memoContext || context}\n\nこのメモ・所感をもとに、自分の言葉・視点を活かしたSNS投稿文を作成してください。専門的すぎず、読者と対話するような自然な文体で。280文字前後。`,
    };

    const labelMap = {
      sns: 'SNS投稿文',
      episode: 'エピソード下書き',
      qa: 'Q&A形式のまとめ',
      slide: 'スライド用アウトライン',
      newsletter: 'ニュースレター・メモ形式',
      memo_post: 'メモ・所感ベースの発信文',
    };

    const resultArea = document.getElementById('gen-result-area');
    const resultContent = document.getElementById('gen-result-content');
    resultContent.innerHTML = '';
    resultArea.classList.remove('hidden');

    for (const type of selected) {
      const prompt = prompts[type];
      if (!prompt) continue;
      try {
        const res = await fetch(
          `${GEMINI_API_BASE}/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
          }
        );
        const data = await res.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '（生成失敗）';

        const block = document.createElement('div');
        block.className = 'border border-gray-200 rounded-xl p-4 space-y-2';
        block.innerHTML = `
          <div class="flex items-center justify-between">
            <p class="text-xs font-semibold text-gray-500">${labelMap[type]}</p>
            <button onclick="copyText(this)" data-text="${escapeAttr(text)}"
              class="text-xs text-gray-400 hover:text-primary transition-colors">コピー</button>
          </div>
          <pre class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed font-sans">${escapeHtml(text)}</pre>
        `;
        resultContent.appendChild(block);
      } catch (e) {
        const block = document.createElement('div');
        block.className = 'text-xs text-red-400 p-3 border border-red-100 rounded-xl';
        block.textContent = `${labelMap[type]}: 生成に失敗しました（${e.message}）`;
        resultContent.appendChild(block);
      }
    }

    btn.disabled = false;
    btn.textContent = '生成する';
    resultArea.scrollIntoView({ behavior: 'smooth' });
  };

  window.copyText = function(btn) {
    const text = btn.dataset.text;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'コピーしました！';
      setTimeout(() => btn.textContent = 'コピー', 2000);
    });
  };

  function escapeHtml(str) {
    return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function escapeAttr(str) {
    return String(str ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
</script>
</body>
